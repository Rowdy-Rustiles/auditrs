/*

An example Config.toml file for auditrs. In production, these are stored at /etc/auditrs/config.toml

*/

[meta]
version = "0.3.0"

[settings]
log_format = "legacy"
active_directory = "/var/log/auditrs/active"
primary_directory = "/var/log/auditrs/primary"
journal_directory = "/var/log/auditrs/journal"
log_size = 4194304
journal_size = 16
primary_size = 67108864
